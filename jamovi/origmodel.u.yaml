title: Latent State Only
name: Origmodel
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Response Variable (DV)
        children:
          - type: VariablesListBox
            name: response
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Latent States Variable
        children:
          - type: VariablesListBox
            name: subscale
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Participant IDs
        children:
          - type: VariablesListBox
            name: subject
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Directional Coding Variable
        children:
          - type: VariablesListBox
            name: direction
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: dirRev
        format: string
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: resp_opts
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: ls_plot
      - type: CheckBox
        name: subj_est_table
      - type: ActionButton
        name: get_subj_ests
